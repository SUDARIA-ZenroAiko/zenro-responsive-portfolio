<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID card – combined</title>
    <style>
        * {
            padding: 0px;
            margin: 0px;
        }

        .whole {
            width: 530px;
            height: 512px;
            background-color: white;
            margin: 0 auto;
            border: 4px solid black;
            border-radius: 30px;
            box-sizing: border-box;
        }

        .id {
            width: 530px;
            height: 70px;
            text-align: center;
            background-color: rgb(14, 48, 141);
            padding-top: 5px;
            border-top-right-radius: 30px;
            border-top-left-radius: 30px;
            box-sizing: border-box;
        }

        .id h1 {
            color: rgb(30, 144, 255);
            font-size: 22px;
            padding-top: 10px;
            margin: 0;
        }

        .school-id {
            color: rgb(235, 107, 9);
            font-size: 16px;
            margin-top: 5px;
        }

        .ref {
            margin-top: -120px;
            padding-left: 100px;
        }

        .sign {
            padding-top: 80px;
            padding-left: 200px;
            font-size: 35px;
        }

        .info {
            display: flex;
            gap: 20px;
            margin-top: -30px;
            margin-left: 20px;
        }

        .label {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label p {
            color: rgb(235, 107, 9);
            font-size: 30px;
            margin: 0;
        }

        .answer {
            display: flex;
            gap: 10px;
            flex-direction: column;
            margin-top: 0;
        }

        .answer p {
            color: black;
            font-size: 30px;
            margin: 0;
        }

        .answer span {
            color: black;
        }

        .answer em {
            color: rgb(235, 107, 9);
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="whole">
        <div class="id">
            <h1>STUDENT ID CARD</h1>
            <p class="school-id"><strong>School ID: 20240030676</strong></p>
        </div>
        <br><br><br>
        <div class="ref"></div>
        <div class="sign"></div>
        <br><br><br>
        <div class="info">
            <div class="label">
                <p><strong>Name:</strong></p>
                <p><strong>Course:</strong></p>
                <p><strong>Bio:</strong></p>
                <p><strong>Email:</strong></p>
                <p><strong>Contact Info:</strong></p>
            </div>
            <div class="answer">
                <p><span>Jeff Irie Kawalski</span></p>
                <p><span>BS Computer Science 2</span></p>
                <p><em>Donut lover</em></p>
                <p><span>jeffkawalsk@my.xu.edu.ph</span></p>
                <p><span>09356767344</span></p>
            </div>
        </div>
    </div>
</body>

</html>
