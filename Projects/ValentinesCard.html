<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine envelope · interactive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Poppins:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fae1dd;
            padding: 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .envelope-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: #f08080;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope::before {
            content: '';
            position: absolute;
            width: 212px;
            height: 212px;
            background: #f08080;
            transform: rotate(45deg);
            top: -105px;
            left: 44px;
            border-radius: 30px 0 0 0;
        }

        .envelope-flap {
            position: absolute;
            border-right: 180px solid #f4978e;
            border-top: 95px solid transparent;
            border-bottom: 100px solid transparent;
            left: 120px;
            top: 5px;
            z-index: 10;
        }

        .envelope-flap::before {
            content: '';
            position: absolute;
            border-left: 300px solid #fda996;
            border-top: 195px solid transparent;
            left: -120px;
            top: -95px;
        }

        .card {
            position: relative;
            width: 250px;
            height: 180px;
            background: white;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1s;
            z-index: 5;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 2px dashed #003049;
        }

        .envelope-wrapper:hover .card,
        .envelope-wrapper.open .card {
            transform: translateY(-100px);
        }

        .card-text {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            text-align: center;
            line-height: 1.2;
            color: #003049;
        }

        .envelope-shadow {
            position: absolute;
            width: 330px;
            height: 25px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            top: 265px;
            left: -15px;
            animation: shadow-scale 3s ease-in-out infinite;
        }

        .hearts-container {
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translateX(-50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .envelope-wrapper:hover .hearts-container,
        .envelope-wrapper.open .hearts-container {
            opacity: 1;
        }

        .heart {
            position: absolute;
            color: #d9534f;
            font-size: 18px;
            animation: float-up 3s linear forwards;
        }

        .button-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            font-weight: 800;
            background: #d9534f;
            border: 2px solid #d9534f;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            text-transform: uppercase;
            padding: 10px 20px;
            min-width: 120px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: transparent;
            color: #d9534f;
            transform: translateY(-2px);
        }

        .no-page {
            text-align: center;
            max-width: 420px;
        }

        .sad-card {
            background: rgba(255, 255, 255, 0.75);
            border-radius: 22px;
            padding: 28px 22px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
        }

        .sad-gif {
            width: 220px;
            max-width: 100%;
            margin-bottom: 14px;
            border-radius: 12px;
        }

        .question {
            font-family: 'Dancing Script', cursive;
            font-size: 34px;
            margin: 8px 0 18px;
            color: #003049;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 999px;
            font-weight: 600;
            background: #d9534f;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .yes-page {
            max-width: 520px;
        }

        .invite-card {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 26px 22px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
        }

        .invite-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .invite-label {
            font-size: 13px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            opacity: 0.75;
            margin-bottom: 8px;
        }

        .invite-title {
            font-family: 'Dancing Script', cursive;
            font-size: 44px;
            line-height: 1.05;
            color: #003049;
            margin: 8px 0 2px;
        }

        .invite-subtitle {
            font-weight: 600;
            color: #d9534f;
        }

        .divider {
            height: 1px;
            background: rgba(0, 48, 73, 0.15);
            margin: 18px 0;
        }

        .info-section {
            display: grid;
            gap: 16px;
            margin-bottom: 18px;
        }

        .info-row h2 {
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #003049;
            margin-bottom: 6px;
        }

        .info-row p {
            color: rgba(0, 48, 73, 0.85);
            line-height: 1.45;
        }

        .menu-list {
            margin: 0;
            padding-left: 18px;
            color: rgba(0, 48, 73, 0.85);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #003049;
        }

        .heart-icon {
            color: #d9534f;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-30px);
            }
        }

        @keyframes shadow-scale {

            0%,
            100% {
                transform: scaleX(1);
            }

            50% {
                transform: scaleX(0.85);
            }
        }

        @keyframes float-up {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--x), -120px) scale(1.4);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <!-- ENVELOPE PAGE -->
    <div id="envelope-page" class="page active">
        <div class="envelope-container">
            <div class="envelope-wrapper" id="envelope">
                <div class="envelope">
                    <div class="card">
                        <div class="card-text">Will you <br> be my Valentine?</div>
                    </div>
                </div>
                <div class="envelope-flap"></div>
                <div class="hearts-container" id="hearts"></div>
                <div class="envelope-shadow"></div>
            </div>
            <div class="button-group">
                <button class="btn" onclick="showPage('yes-page')">Yes</button>
                <button class="btn" onclick="showPage('no-page')">No</button>
            </div>
        </div>
    </div>

    <!-- NO PAGE -->
    <div id="no-page" class="page no-page">
        <div class="sad-card"> <!-- added missing wrapper to match CSS -->
            <p class="question">Are you sure?</p>
            <button class="btn-back" onclick="showPage('envelope-page')">Go Back</button>
        </div>
    </div>

    <!-- YES PAGE -->
    <div id="yes-page" class="page yes-page">
        <div class="invite-card">
            <div class="invite-header">
                <h1 class="invite-title">Yay!</h1>
                <p class="invite-subtitle">I knew you would accept me!</p>
            </div>
            <div class="divider"></div>
            <div class="info-section">
                <div class="info-row">
                    <p style="text-align: center; font-size: 18px; color: #003049;">
                        You just made my day! ✨<br><br>
                        I can't wait to spend Valentine's Day with you!
                    </p>
                </div>
            </div>
            <div class="actions">
                <button class="btn-back" onclick="showPage('envelope-page')">Back</button>
            </div>
            <p class="footer"><span class="heart-icon">❤❤❤</span></p>
        </div>
    </div>

    <script>
        (function () {
            window.showPage = function (pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            };
            const envelope = document.getElementById('envelope');
            const heartsContainer = document.getElementById('hearts');
            let heartInterval = null;

            function createHeart() {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.innerHTML = '❤';
                const x = Math.random() * 60 - 30;
                heart.style.setProperty('--x', `${x}px`);
                heartsContainer.appendChild(heart);
                setTimeout(() => heart.remove(), 3000);
            }
            function startHearts() { if (!heartInterval) heartInterval = setInterval(createHeart, 400); }
            function stopHearts() { clearInterval(heartInterval); heartInterval = null; }

            envelope.addEventListener('mouseenter', startHearts);
            envelope.addEventListener('mouseleave', stopHearts);
            envelope.addEventListener('click', (e) => {
                e.stopPropagation();
                envelope.classList.toggle('open');
                if (envelope.classList.contains('open')) startHearts(); else stopHearts();
            });

            const originalShowPage = window.showPage;
            window.showPage = function (pageId) {
                if (pageId !== 'envelope-page') { stopHearts(); envelope.classList.remove('open'); }
                originalShowPage(pageId);
            };
        })();
    </script>
</body>

</html>
